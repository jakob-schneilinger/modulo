<div class="jumbotron mt-5">
  <a *ngIf="!authService.isLoggedIn()" class="btn btn-primary btn-lg" routerLink="/login" role="button">Login</a>
  <div class="justify-content-between d-flex flex-row align-items-center">
    <button class="btn btn-primary" (click)="createBoard()">Create</button>
    <div class="form-check form-switch">
      <input
        class="form-check-input"
        type="checkbox"
        role="switch"
        id="flexSwitchCheckDefault"
        [(ngModel)]="inEditMode"
      >
      <label class="form-check-label" for="flexSwitchCheckDefault">Enable Edit Mode to Drag and Resize Components</label>
    </div>

  </div>
  <div *ngIf="authService.isLoggedIn()">
      <app-container-component
        [id]="'board-' + containers[0].id"
        [depth]=0
        [container]="containers[0]"
        [inEditMode]="inEditMode"
        (widthChanged)="onWidthChanged($event)"
        (startDraggingContainer)="startDragging($event)"
        (stopDraggingContainer)="stopDragging(undefined)"
      >
      </app-container-component>


  </div>
</div>

<a routerLink="/user/me">User page</a>
