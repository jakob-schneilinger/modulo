<div #previewCard [attr.data-preview-id]="self.id" class="preview-card"></div>
<div  #card [attr.data-id]="self.id" [ngClass]="{'card p-2':!!parentContainer}" [class.task-done]="task?.completed"
     [class.task-overdue]="taskOverdue()" [class.task-inProgress]="taskInProgress()">
    <div *ngIf="self.id !== -1" class="d-flex justify-content-between align-items-start">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
              rel="stylesheet">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <div class="container-header">
            <ng-container *ngIf="self.type === 'board'">
              <ng-container *ngIf="!editingTitle; else titleEditor">
                <h5 [ngClass]="{'resizing': isResizing}" (dblclick)="startEditTitle()">
                  {{ self.name }}
                </h5>
              </ng-container>
            </ng-container>


          <ng-container *ngIf="self.type === 'task'">
            <ng-container *ngIf="!editingTitle; else titleEditor">
            <h5 class="mx-1" [ngClass]="{'resizing' : isResizing}">
                <div class="task-item">
                  <input
                    type="checkbox"
                    id="task-complete-box"
                    name="task-complete"
                    disabled="{{available()}}"
                    [(ngModel)]="task.completed"
                    (ngModelChange)="onCompletedChange($event)"

                  >
                  <label for="task-complete-box" (dblclick)="startEditTitle()">{{ self.name }}</label>
                </div>
            </h5>
            </ng-container>
          </ng-container>
        </div>


          <ng-template #titleEditor>
          <textarea class="form-control form-control-sm mb-1" [(ngModel)]="titleBuffer" rows="1" maxlength="255"
                    style="font-size: 1.1rem;"></textarea>
            <div class="d-flex gap-1">
              <button class="btn btn-sm btn-primary" (click)="saveTitle()">Save</button>
              <button class="btn btn-sm btn-outline-secondary" (click)="cancelTitle()">Cancel</button>
            </div>
          </ng-template>




        <div *ngIf="self.id !== -1">
            <div class="three-dots dropdown" (mousedown)="startContainerDrag(self, $event)"
                 (mouseup)="stopContainerDrag()"
            >
                <i class="bi text-secondary" [ngClass]="{
           'bi-arrows-move': inEditMode,
           'bi-three-dots': !inEditMode,
           'grab': inEditMode,
           'point': !inEditMode
         }" id="dropdownMenuButton-{{self.id}}" data-bs-toggle="dropdown" aria-expanded="false"></i>

                <ul class="dropdown-menu" [attr.aria-labelledby]="'dropdownMenuButton-' + self.id"
                    [hidden]="inEditMode">
                    <li><a class="dropdown-item">Edit Title</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item" (click)="enableEditMode()">Enable Edit Mode</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item"
                           (click)="deleteComponent()">Delete {{ capitalizeFirstLetter(self.type) }}</a></li>
                </ul>

            </div>
        </div>
    </div>


    <ng-container *ngIf="self.type === 'task' && getTotalTasks() >0">
        <div class="task-date">
            <!-- outlined empty checkbox -->
            <i class="material-icons-outlined">
                {{ 'check_box' }}
            </i>
            <span>{{ getCompletedTasks() }}/{{ getTotalTasks() }}</span>
        </div>


    </ng-container>
    <ng-container *ngIf="self.type === 'task'">

        <label
                class="task-date"
                *ngIf="!endDateEditable() && !editingEndDate "
                (click)="editingEndDate = true"

        >
            Add due date…
        </label>


        <div class="task-date">
            <ng-container *ngIf="editingEndDate || endDateEditable()">
                <i class="material-icons-outlined">access_time</i>
                <input
                        type="date"
                        [(ngModel)]="endDateText"
                        class="date-picker"
                >
                <button class="buttonDel" style="font-size:10px" (click)="deleteEndDate()"><i class="material-icons">delete</i>
                </button>
                <button title="Repeat this task after deadline!" class="buttonDel" style="font-size:12px"
                        (click)="setRepeating()" [class.Selected]="task.repeating" *ngIf="isNotChildOfTask">
                    <i class="material-icons"> cached</i>
                </button>
            </ng-container>
        </div>
        <div class="task-date-arrow">
            <ng-container *ngIf="editingStartDate || startDateEditable()">
                <i class="task-date-arrow">&#8613;</i>
                <input
                        type="date"
                        [(ngModel)]="startDateText"
                        class="date-picker"
                >
                <button class="buttonDel" style="font-size:10px" (click)="deleteStartDate()"><i
                        class="material-icons">delete</i></button>
            </ng-container>
        </div>

        <label
                class="task-date"
                *ngIf="!startDateEditable() &&!editingStartDate && endDateEditable() "
                (click)="editingStartDate = true"

        >
            Add start date…
        </label>
    </ng-container>
    <div class="container-grid" [id]="'container-grid-' + self.id" #grid>
        <ng-container *ngFor="let child of containerChildren">
            <!-- render a TaskComponent for tasks -->
            <app-task-component
                    [isNotChildOfTask] = "false"
                    [id]="'container-' + child.id" [depth]=depth+1
                    [self]="child" [parentContainer]="self" [parentGridElInput]="gridEl"
                    [homeGridElInput]="depth > 0 ? homeGridEl : gridEl" [inEditMode]="inEditMode"
                    (startDraggingContainer)="startDraggingContainer.emit($event)"
                    (stopDraggingContainer)="stopDraggingContainer.emit()"
                    class="card-component"
                    [ngStyle]="{
        'grid-column': child.column + ' / ' + (child.column + child.width),
        'grid-row': child.row + ' / ' + (child.row + child.height),
      }"
                    [ngClass]="{ 'preview-container': child.id === -1 }"
            ></app-task-component>

          <app-image-component *ngFor="let child of imageChildren" [id]="'image-' + child.id" [self]="child" [depth]="depth+1"
                               [parentContainer]="self" [parentGridElInput]="gridEl" [homeGridElInput]="depth > 0 ? homeGridEl : gridEl" [inEditMode]="inEditMode"
                               (startDraggingContainer)="startDraggingContainer.emit($event)"
                               (stopDraggingContainer)="stopDraggingContainer.emit()" class="card-component" [ngStyle]="{
      'grid-column': child.column + ' / ' + (child.column + child.width),
      'grid-row': child.row + ' / ' + (child.row + child.height),
    }" [ngClass]="{ 'preview-container': child.id === -1 }">
          </app-image-component>

        </ng-container>



        <app-text-component *ngFor="let child of textChildren" [id]="'text-' + child.id" [self]="child" [depth]="depth+1"
                            [parentContainer]="self" [parentGridElInput]="gridEl" [homeGridElInput]="depth > 0 ? homeGridEl : gridEl" [inEditMode]="inEditMode"
                            (startDraggingContainer)="startDraggingContainer.emit($event)"
                            (stopDraggingContainer)="stopDraggingContainer.emit()" class="card-component" [ngStyle]="{
        'grid-column': child.column + ' / ' + (child.column + child.width),
        'grid-row': child.row + ' / ' + (child.row + child.height),
      }" [ngClass]="{ 'preview-text-container': child.id === -1 }">
        </app-text-component>


    </div>
    <div *ngIf="!!parentContainer && inEditMode && self.id !== -1" class="resizer" [id]="'resizer-' + self.id">
        <i class="bi bi-arrows-angle-expand"></i>
    </div>
</div>
