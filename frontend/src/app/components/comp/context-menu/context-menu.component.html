<div class="three-dots dropdown point">
    <i class="bi bi-three-dots text-secondary" data-bs-toggle="dropdown" aria-expanded="false" data-cy="manage-dropdown"></i>

    <ul class="dropdown-menu">
        @for (entry of actions; track entry) {
        <li>
            <a class="dropdown-item" (click)="entry.action()" [attr.data-cy]="'context-' + entry.label">{{entry.label}}</a>
        </li>
        @if (!$last) {
        <hr class="dropdown-divider">
        }
        }
    </ul>
</div>
