<div class="container">

  <div class="row align-self-center m-4 pt-2">
    <h1>Welcome home{{getDisplayname}}! 👋👋👋</h1>
    <h6 class="ms-3">Come look at your boards</h6>
  </div>

  <div class="row align-content-center">
    <div class="row row-cols-1 row-cols-md-3 g-4">

      @for(board of roots; track board){
      <div (click)="navigateToBoard(board)" [attr.data-cy]="'homepage-root-board-link'">
        <div class="col" >
          <div class="card h-100 p-5">
            <div class="card-body">
              <h5 class="card-title">{{board.name}}</h5>
            </div>
          </div>
        </div>
      </div>
      }

      <div (click)="createBoard()" [attr.data-cy]="'homepage-root-board-create'" >
        <div class="col" >
          <div class="card h-100 board-create p-5">
            <div class="card-body ">
              <h5 class="card-title">
                Create new Board    <i class="bi bi-plus-square"></i>
              </h5>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>
